def binaryCompatibilityTasks = binaryCompatibilityProjects.collect { comparedProject ->
    def capitalizedName = comparedProject.name.split('-').collect { it.capitalize() }.join('')
    def baselineJar = new File(binaryCompatibilityBaselineDir, "${comparedProject.name}-${binaryCompatibilityBaselineVersion}.jar")
    tasks.register("japicmp${capitalizedName}", me.champeau.gradle.japicmp.JapicmpTask) {
        group = 'verification'
        description = "Checks binary compatibility for ${comparedProject.name} against ${binaryCompatibilityBaselineVersion}."
        dependsOn comparedProject.tasks.named('jar')
        oldClasspath.from(files(baselineJar))
        newClasspath.from(comparedProject.tasks.named('jar'))
        oldArchives.from(files(baselineJar))
        newArchives.from(comparedProject.tasks.named('jar'))
        onlyModified = true
        onlyBinaryIncompatibleModified = true
        failOnModification = true
        ignoreMissingClasses = true
        txtOutputFile = new File(
                comparedProject.layout.buildDirectory.get().asFile,
                "reports/japicmp/${comparedProject.name}.txt"
        )
        onlyIf {
            baselineJar.isFile()
        }
    }
}

tasks.register('establishBinaryCompatibilityBaseline') {
    group = 'verification'
    description = 'Creates the v1.0.0 binary compatibility baseline jars when they do not exist yet.'
    dependsOn binaryCompatibilityProjects.collect { it.tasks.named('jar') }

    doLast {
        binaryCompatibilityBaselineDir.mkdirs()
        binaryCompatibilityProjectNames.each { projectName ->
            def baselineJar = new File(binaryCompatibilityBaselineDir, "${projectName}-${binaryCompatibilityBaselineVersion}.jar")
            if (!baselineJar.isFile()) {
                def currentJar = new File(projectRootPath, "${projectName}/build/libs/${projectName}-${publicationVersion}.jar")
                java.nio.file.Files.copy(currentJar.toPath(), baselineJar.toPath())
            }
        }
    }
}

binaryCompatibilityTasks.each {
    it.configure {
        mustRunAfter tasks.named('establishBinaryCompatibilityBaseline')
    }
}

tasks.register('verifyBinaryCompatibility') {
    group = 'verification'
    description = 'Checks binary compatibility of published runtime modules, establishing the v1.0.0 baseline on first run.'
    dependsOn 'establishBinaryCompatibilityBaseline'
    dependsOn binaryCompatibilityTasks
}

