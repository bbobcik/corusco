tasks.register('verifyPublishedPackageSurface') {
    group = 'verification'
    description = 'Verifies that published source packages match the reviewed API surface.'

    doLast {
        publishedPackageSurface.each { projectName, expectedPackages ->
            def sourceRoot = new File(projectRootPath, "${projectName}/src/main/java")
            def actualPackages = [] as Set
            java.nio.file.Files.walk(sourceRoot.toPath()).withCloseable { stream ->
                stream
                        .filter { java.nio.file.Files.isRegularFile(it) }
                        .filter { it.fileName.toString().endsWith('.java') }
                        .filter { it.fileName.toString() != 'module-info.java' }
                        .forEach { sourceFile ->
                            def matcher = (sourceFile.toFile().text =~ /(?m)^\s*package\s+([A-Za-z0-9_.]+)\s*;/)
                            if (matcher.find()) {
                                actualPackages.add(matcher.group(1))
                            }
                        }
            }

            def expected = expectedPackages as Set
            def unexpected = (actualPackages - expected).sort()
            def missing = (expected - actualPackages).sort()
            if (!unexpected.isEmpty() || !missing.isEmpty()) {
                throw new GradleException("""
                        Preview package surface mismatch for ${projectName}.
                        Unexpected packages: ${unexpected}
                        Missing packages: ${missing}
                        Update docs/api-review.md and publishedPackageSurface intentionally.
                        """.stripIndent())
            }
        }
    }
}

tasks.register('verifyPreviewPackageSurface') {
    group = 'verification'
    description = 'Compatibility alias for verifyPublishedPackageSurface.'
    dependsOn 'verifyPublishedPackageSurface'
}

tasks.register('verifyRuntimeReflectionPolicy') {
    group = 'verification'
    description = 'Rejects JavaBeans and runtime reflection constructs in runtime modules.'

    doLast {
        def violations = []
        runtimeReflectionScanRoots.each { relativeRoot ->
            def sourceRoot = new File(projectRootPath, relativeRoot)
            java.nio.file.Files.walk(sourceRoot.toPath()).withCloseable { stream ->
                stream
                        .filter { java.nio.file.Files.isRegularFile(it) }
                        .filter { it.fileName.toString().endsWith('.java') }
                        .forEach { sourceFile ->
                            def text = sourceFile.toFile().text
                            forbiddenRuntimeReflectionPatterns.each { pattern ->
                                if (text.contains(pattern)) {
                                    def relativePath = java.nio.file.Path.of(projectRootPath).relativize(sourceFile)
                                    violations.add("${relativePath} contains ${pattern}")
                                }
                            }
                        }
            }
        }
        if (!violations.isEmpty()) {
            throw new GradleException("Forbidden runtime reflection/API usage:\n" + violations.sort().join('\n'))
        }
    }
}

tasks.register('verifyApiAudit') {
    group = 'verification'
    description = 'Runs API/package surface and runtime reflection policy checks.'
    dependsOn 'verifyPublishedPackageSurface'
    dependsOn 'verifyRuntimeReflectionPolicy'
